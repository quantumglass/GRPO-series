# Countdown 任务 — 24GB 显存配置（优化器状态 offload 到 CPU）
# 用法: uv run python train.py --config configs/train_countdown_24gb.yaml

model:
  pretrained_model_path: "models/Qwen2.5-3B-Instruct"
  device: "cuda"
  dtype: "bfloat16"

data:
  path: "data/Countdown-Tasks-3to4"
  test_size: 128

training:
  random_seed: 1337
  max_prompt_len: 256
  max_gen_len: 1024
  batch_size: 256
  num_questions_per_batch: 32
  micro_batch_size: 2
  max_grad_norm: 1.0
  learning_rate: 1.0e-5
  weight_decay: 0.0
  betas: [0.9, 0.999]
  ckpt_dir: "ckpt"
  log_dir: "logs"
  skip_unfinished_episodes: false
  ckpt_save_interval: 100
  eval_interval: 10
  memory_efficient_adamw: true
