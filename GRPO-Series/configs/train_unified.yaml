# 统一训练配置：多数据集 + LoRA + GSPO/PPO
# 用法: uv run python train_unified.py --config configs/train_unified.yaml

model:
  pretrained_model_path: "models/Qwen2.5-3B-Instruct"
  device: "cuda"
  dtype: "bfloat16"

dataset:
  # 可选: countdown | dapo_math_17k | deepscaler
  name: "deepscaler"
  countdown_path: "data/Countdown-Tasks-3to4"
  dapo_parquet_path: "data/DAPO-Math-17k/data/dapo-math-17k.parquet"
  deepscaler_json_path: "data/deepscaler/deepscaler.json"
  test_size: 256

training:
  # 可选: full | lora
  mode: "lora"
  random_seed: 1337
  max_prompt_len: 1024
  max_gen_len: 2048

  sampling:
    do_sample: true
    temperature: 0.8
    top_p: 1.0
    top_k: 0

  # PPO 裁剪 + GSPO 响应级优势
  use_ppo_clip: true
  advantage_mode: "gspo"          # grpo | gspo
  gspo_clip_len_scaling: "sqrt"   # linear | sqrt | none
  beta: 0.02                      # KL 惩罚系数
  clip_ratio_low: 0.2
  clip_ratio_high: 0.28
  ppo_epochs: 2

  advantage_std_threshold: 1.0e-6
  center_advantages: true
  scale_advantages_by_std: true
  advantage_std_epsilon: 1.0e-4
  drop_zero_adv_groups: true

  batch_size: 768
  num_questions_per_batch: 48
  micro_batch_size: 4
  max_grad_norm: 0.9
  learning_rate: 1.0e-5
  weight_decay: 0.1
  betas: [0.9, 0.99]

  lora:
    r: 32
    alpha: 64
    dropout: 0.0
    target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]

  log_dir: "logs"
  resume_lora_ckpt: null
  resume_log_dir: null
  skip_unfinished_episodes: false
  ckpt_save_interval: 10
  eval_interval: 10
  memory_efficient_adamw: false
